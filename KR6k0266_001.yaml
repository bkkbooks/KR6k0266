body:
  text: 沙門弘一撰一余弘律之因緣初出家時即讀梵網合注續讀靈峯宗論乃發起學律之願受戒時隨時參讀傳戒正範及毗尼事義集要庚申之春自日本請得古版南山靈芝三大部計八十餘册辛酉之春始編戒相表記六月第一次草稿乃訖以後屢經修改手抄數次是年閲藏得見義淨三藏所譯有部律及南海寄歸內法傳深為讚歎謂較舊律為善故四分戒相表記第一二次草稿中屢引義淨之説以糾正南山其後自悟輕謗古德有所未可遂塗抹之經多次刪改乃成最後之定本以後雖未敢謗毀南山但於南山三大部仍未用心窮研故即專習有部律二年之中編有部犯相摘記一卷自行抄一卷其時徐霨如居士創刻經處於天津專刻南山宗律書費資數萬金歷時十餘年乃漸次完成徐居士始聞余宗有部而輕南山嘗規勸之以為吾國千餘年來承秉南山一宗今欲弘律宜仍其舊貫未可更張余因是乃有兼學南山之意爾後此意漸次增進至辛未二月十五日乃於佛前發願棄捨有部專學南山并隨力弘揚以贖昔年輕謗之罪昔佛滅後九百年北天竺有無著天親等兄弟三人天親先學小乘而謗大乘後聞長兄無著示誨懺悔執小之非欲斷舌謝其罪無著云汝既以舌誹謗大乘更以此舌讚大乘可也於是天親遂造五百部大乘論余今亦爾願盡力專學南山律宗弘揚讚歎以贖往失此余由新律家而變為舊律家之因緣亦即余發願弘南山宗之因緣也二略述律學之派別一化教依大乘律宗之説以大小二乘若道若俗當守之戒律化制二教皆屬制教經論所言理觀等乃名化教二制教亦云行教依小乘律宗之説制教唯是道衆當守之戒律局於小乘已外悉為化教今且依大乘律宗之説一密教律如唐善無畏三藏禪要及大日經并一行禪師疏義釋廣明制教中分二二顯教律如下所明大小二乘律是一大乘律如梵網善戒等瑜伽論戒本宗於菩薩善戒經顯教律分二二小乘律如四分十誦等一舊律家之説如今所述小乘諸律分部有二説二新律家之説如唐義淨三藏南海寄歸內法傳所述今不録出異説最多舊律家傳小乘律分五部有二説佛滅百年後第五祖優婆毱多尊者之下新律家云四部有五弟子同時於律藏分五部派別一依大集經一曇無德部四分律二薩婆多部十誦律三迦葉遺部但傳戒本即解脫戒經僧祇律即是根本部四彌沙塞部五分律五婆粗富羅部未傳以上五部皆由彼部主依此僧祇律中契同己見者集為一部二義鈔所引三藏口傳及遺教法律經此説無婆粗富羅部即以僧祇律列入五部拾毗尼義鈔即舍利弗問經古師多謂僧祇本律即婆粗富羅者非也附律論善見論見論四分依南山律所引用者録毗尼母論母論薩婆多毗婆沙多論薩婆多摩得勒伽伽論十誦五百問論明了論正量部南山三十五歲往學僅一月即故甚多舉大一相州日光寺法礪相部律州稱部者僧傳之語例此土四分律宗三大家二終南山道宣南山律三西太原寺東塔懷素東塔律一宋錢塘昭慶寺允堪亦稱天台律師四分南山宗下二派二宋錢塘靈芝寺元照八十誦律即根本之律藏也如來滅後結集三藏之時優婆離尊者於一夏九旬之間八十番誦出之故名八十誦律佛滅後百年內唯有此律始分二部佛滅後結集之時即有上座部大衆部窟內上座窟外大衆之異但此時猶非宗義之別稱而上座與大衆之名實起於此逮佛滅後百年始分宗義為二部即用昔名而分五部十八部等亦即依此而分也僧祇僧祇翻為大衆但即窟內上座部也僧祇律者此根本二部中之窟內上座因大衆之名通二部故三此土流傳之次第曹魏時始譯僧祇戒心四分羯磨斯二部初傳洛陽是為大僧受戒之始也此據南山所傳若約他家傳述漢靈帝以後北天竺有五沙門創與此方五人受戒所誦戒本即古戒本是也其時比丘尼唯從一衆邊受至劉宋文帝時有西尼來乃足十數是為比丘尼於二部中受戒之始也姚秦弘始六年至八年譯十誦律姚秦弘始十二年至十五年譯四分律以上二種譯於關中東晉安帝義熙十四年譯僧祇律劉宋景平元年譯五分律以上二種譯於江左此四種所譯時代略同也唐天后久視至睿宗景雲時譯根本説一切有部律此律南山未見江南嶺表十誦先盛關中陝西諸處多承僧祇四分雖譯於姚秦而至元魏孝文時法聰乃始弘揚法聰本習僧祇因考受體遂弘四分五傳至智首智首傳於南山四分一宗乃大盛焉五分罕有弘通者南山嘗稱其文勝而傷歎也根本説一切有部律翻譯最為完密但譯布稍後適在四分盛行之時故未傳布四示今所宗今所宗者為四分南山宗依靈芝諸記而修習焉斯宗妙義讚莫能窮今略舉之一創明圓體有宗一實法宗即薩婆多部十誦律當分小乘教羯磨疏中空宗分判三宗二假名宗即今所承曇無德部四分律過分小乘教雖通大乘非全大教蓋分通也三圓教宗依法華涅槃二經之意決了權乘同歸實道終窮大乘教既開顯大解依小律儀即成大行以大決小不待受大故云圓教也靈芝戒體章云問此與天台圓教為同為異答理同説異何名理同以下疏中引法華文用法華意立此圓體但彼教統攝此局一事何名説異今此為明戒體直取佛意融前二宗自得此談非謂取彼但名相濫是故異也此為南山律之樞要最宜窮研具如行事鈔業疏及記廣明二包含精博以四分為主兼採他部具備衆長故靈芝云貫攝兩乘囊包三藏遺編雜集攢聚成宗斯宗崛興獨盛當世自是九代諸師之作蔑如無聞歿後數百年間沛然莫禦非四依大士垂示像季者其孰能至於此哉南山靈芝諸撰述自宋已後多佚不傳明季靈峯藕益大師寶華三昧見月諸律師等雖有重興律宗之意而諸家撰述佚失無由承稟近今三十年來中土古德佚著乃自東瀛取返復顯於世蓋佚流海外已近千年矣學者得是希有難逢之寶典宜如何歡欣而踴躍耶南山律典目録據現今流傳者先後次第依靈芝録四分律刪繁補闕行事鈔十二卷六册天津版已下皆同四分律拾毗尼義鈔四卷二册四分律刪補隨機羯磨二卷一册四分律刪補隨機羯磨疏四卷會入羯磨文十二卷六册四分律含注戒本三卷二册四分律含注戒本疏四卷會入戒本文十二卷六册四分律刪定僧戒本一卷一册四分律比丘尼鈔六卷三册量處輕重儀二卷一册釋門章服儀一卷與釋門歸敬儀合册釋門歸敬儀一卷律相感通傳一卷一册教誡新學比丘行護律儀一卷一册關中創立戒壇圖經一卷一册舍衛國祇洹寺圖經二卷與戒壇圖經合册淨心誡觀法一卷與新學比丘行護律儀合册大藏經會謹案徐文霨居士輯録南山文賸三卷一册與上十六種合編為南山律要靈芝録無弘一大師原稿無靈芝律典目録皆天津版行事鈔資持記四十二卷與鈔合會二十册羯磨疏濟緣記二十二卷與疏合會十二册戒本疏行宗記十六卷與疏合會十六册芝苑遺編五卷二册內附載他文刪定尼戒本今附刊四分律比丘尼鈔後章服儀應法記一卷一册道具賦一卷一册佛制比丘六物圖一卷一册遺教經論住法記二卷二册五此次講律之學程四分律含注戒本含注擇講其不講者於下學程講隨機羯磨時補講之戒相表記全册皆細講惟警策語等略講之六所用之教授法參用新教授法務期明瞭易解惟依文釋義無有發揮如三寶七佛乃至涅槃等義講釋尤略難解之文言及律學專門名詞必不得已乃用之用時隨即略為解釋教材極為簡單罕有增加惟增加下記數種講解之前先略説律學派別等靈峯宗論及毗尼事義集要中有警策之文及問答等酌為選録隨時附講講廣教別序後略説篇聚名義等盜戒依戒疏事鈔增之消釋文義皆宗南山靈芝之説凡有新律家所釋與舊説大異者亦附及之以備參考南山鈔疏有時所説不同蓋鈔文猶宗昔解疏文乃改易也七問答遣疑問常人皆謂學律者應偏重行持未審然否答解如目行如足行持固重而不知解義為尤要焉若於律義未能十分了解而以臆見率爾行之執非為是謗是為非他人不知羣起倣效壞亂正法其罪極大古人謂惡紫奪朱即此意也若於律義果能十分了解雖行不足亦可對衆宣揚續佛慧命以正知正見接引後學彼雖不行而其學者或能行也昔鳩摩羅什法師為姚主所逼受女十人不住僧房別立廨舍每至講説常先自云譬如臭泥中生蓮華但採蓮華勿取臭泥所謂依法不依人也由是觀之解義而行持不足猶可弘護正法雖行而解義未徹不免誤入歧途故曰解義為尤要也問破四重戒仍可説法出於何律答十誦律衆中羯磨誦律無堪能者學悔比丘開作説戒自恣羯磨亦聽衆中誦律此且約制教而言雖聽秉法猶名破戒若約化教如涅槃經云犯四重者若披法服猶未捨遠常懷慚愧恐怖自責其心改悔生護法心建立正法為人分別我説是人不為破戒問俗謂不知者無罪今若不學戒律愚無所知雖或犯戒以不知故能無罪否或雖有罪能輕減否答若約未受戒者雖犯而無破戒之罪若已發心受戒即應依律修學盡力行持倘因不學而破戒者於其應得正罪之外更加不學無知諸罪寧復有輕減耶若畏破戒而恐懼者惟有退戒返為白衣耳問戒相繁多具持非易值茲末法最低持戒者以何而為標準答律藏五百結集法云佛涅槃後諸阿羅漢集法之時阿難白大迦葉言我親從佛聞憶持佛語自今已去為諸比丘捨雜碎戒當時阿難愁悲忘失未問何者是雜碎戒制限莫定詢諸比丘言各不同迦葉乃命仍依佛世舊制而具學之不復棄捨當今之時末法鈍根人畏其繁具持非易幸有捨微細戒遺教猶可依行制限多寡人各隨力且約最低標準而言止持之中四棄十三僧殘二不定法悉應精持作持之中結僧界受戒懺罪説戒安居自恣等亦易行耳八未來之希望余於初出家受戒之時未能如法準以律義實未得戒本不能弘揚比丘戒律但因昔時既虛承受戒之名其後又隨力修學粗知大意欲以一隙之明與諸師互相研習甚願得有精通律義之比丘五人出現能令正法住於世間則余之弘律責任即竟故余於講律時不欲聚集多衆但欲得數人發弘律之大願肩荷南山之道統以此為畢生之事業者余將盡其綿力誓捨身命而啓導之學者約分數學程第一學程四分含注戒本戒相表記如前所述共二册餘第二學程隨機羯磨一册於以上二學程學畢即能了知律學大綱戒本羯磨皆須讀誦第三學程行事鈔擇講資持記自閲比丘尼鈔及其他第四學程略講戒本疏自閲義鈔及其他第五學程略講羯磨疏中人之資若能盡力研習約四五年即可學畢但須有恆心決不間斷又須心思精細決不粗浮者乃可能圓滿成就也余於前年二月既發弘律願後五月居某寺即由寺主發起欲辦律學院惟與余意見稍有未同其後寺主亦即退居此事遂罷以後有他寺數處皆約余往辦律學院因據以前之經驗知其困難故未承諾惟於寧波白衣寺門前存一南山律學院籌備處之牌余則允為造就教員二三人耳以後即決定弘律辦法不立名目不收經費不集多衆不固定地址等去年春間在某寺有數人願學律余為講四重十三僧殘後以他故中止夏間居某寺有數人來願學律道心堅固行持甚嚴乃不久彼等即與寺主有故遂往他處以後在此寺舊住者有數人諄囑余講律本擬於八月開講而學者於七月即就職他方故此次在本寺講律實可謂余弘律第一步也以上略述余發心弘律後所經過諸事余業重福輕斷不敢再希望大規模之事業惟冀諸師奮力興起肩荷南山一宗廣傳世間高樹律幢此則為余所祝禱者矣九此次講解之程度初學求解文義宿學參考教授法含注戒本止持佛學院普通佛學課程中律學講義戒相表記作持隨機羯磨簡要顯明每周二小時一學年講畢約八十小時即可了知律學大要所以今講義立酌中標準若在他處預定所講時間更多者即可再增加教材若在戒期內講預定時間僅四十小時左右者即可減少筆記簿子三册余所編之講義草稿將來即可依此轉授初學聽時寫録問答筆問筆答有四利益一問詞與答詞皆能詳細説明二問者與答者皆起鄭重之心決不潦草各負責任三所問之義隨時記録以備教授法上參考四於問答文中選擇精要者列入書中流傳以後口問恕不答覆不合處乞正氣弱講中暫停講題目之前先講三名一律毗尼毗奈耶古譯為滅文見母論從功能為號滅諸惡法故曰毗尼今譯為律律者法也法以楷定為義謂犯不犯輕重等法並律所明即從教為名也二戒尸羅義訓為警由警策三業遠離緣非此明因也對下木叉言三別解脫波羅提木叉或譯為別別或云處處望後究竟近而彰名此明隨分果也言隨分者顯非頓脫即處處義依此三名次第而言律者教也能生行解故在初教不孤立必詮行相戒則因之而立戒不虛因必有果克故解脫絶縛最在其終教行果南山律但列此三名隋淨影具舉四名梵語優婆羅叉正譯曰律梵語毗尼正譯曰滅新譯曰調伏餘二同講題目戒本本者根也或作戒心居中統要故喻為心為本焉一姚秦覺明集譯本佛陀耶舍二元魏慧光刪定本比丘戒本有六部三北齊法願集本四唐道宣集並注本五唐道宣刪定本六唐懷素集本如何形式含注引律廣解參注文中屬何律四分律四度傳文盡所詮相故云四分此據説之所至非義判也第一分二十一卷比丘戒四第二分十五卷尼戒犍度二種分第三分十三卷犍度十六種第四分十一卷犍度二及其他講人號曇無德法護法正法鏡法藏法密佛滅百年法護尊者於根本部中搜括集之太一古文以為終南或謂太一是其別峯講題目人號後寫大科小科於講時擇要舉之甲乙丙丁戊一二一初三二初二初四三二初序三初標初廣二正一二釋二三二三結初序三二略二正四三五六七八三講正文之前先示大科科文大科有三序初一段偈廣略二教總序廣教正宗戒本中廣略二教別序正流通流通序後一段偈廣略二教總流通略教正宗流通略述廣略二教之義略教佛初成道先示行法令依奉行不待犯戒未有罪故略陳教法故曰略教廣教略教通禁三業未列過相雖造諸非不謂有犯故須隨事別制以被鈍根因廣説故名為廣教兩教所為則有四別初根條異略教不待犯而制是根本也廣教略壞方有則枝條也二為人異略教利機無過可起廣教待犯犯必鈍根三對過異略教不因過制純被淨也廣教必待犯後制通淨穢也四請不請異略不待請一往便説廣必待請如舍利弗請佛制廣也説二教時節十二年前略教所被佛自説戒後付弟子乃廣説也佛不説者因重犯也先作無罪猶同無事十二年後因重犯戒佛止不説也五年已制廣教但十二年後乃重犯佛制廣教始於五年自是以後隨犯便結輕重前後雜亂難分至佛滅後乃始結集重輕類分八篇漸降正講總序即是初一段偈文余所圈點戒本依科而分非如尋常讀誦之形式而分也故或疏或密又有割裂文句處也初歸敬三寶稽首稽下也下至地故二歸敬之意中有二初句明意歸敬本意毗尼法毗尼翻律律訓為法名義齊列令易解也後句明益令正法久住善見論佛告阿難有五法令正法久住一毗尼者是汝大師教二下至五人持律在世取知法之能三中國十人邊方五人受具四乃至二十人得出罪五由律師持律故佛法住世五千年約延時之久人三列相勸持中有三科備敘四戒一宗體宗即戒法體謂受體二篇聚即戒相也三持毀得失即戒行也戒法世尊制教宗戒戒體納法成業領納在心體戒行依體起護持毀得失戒相為行有儀篇聚就前體中有二上半陳喻戒如海無涯海為衆流所歸戒為衆善所集體周法界故曰無涯如寶求無厭戒海能生道品三乘所重故言寶也常求不息故云無厭也三十七道品四念處四正勤四如意足五根五力七覺支八正道下半舉益聖法財財即道品恐濫於世故云聖法二略舉篇聚有三初舉教勸修除滅障隨言皆得舉此教本能防未非應起不起二引佛成證大德行滿位高曰大德也此指世尊言律中年少比丘應喚老者為大德此別指比丘言三承傳勸聽善説如教而談名善説也若為名利無益而傳則是綺語非義所攝三明持毀得失就文四喻分二前兩喻寄別行兩喻並言毀戒即是別行別即自行後兩喻寄衆法兩喻並言説戒故為衆行衆即四人已上作羯磨事今指説戒初別行生天人大論戒律不出二義一本如來出世之意三歸五戒下至微善無非為道而作弄引過分而談二乘聖果尚非本懷豈以世樂而評聖旨此約教本也二者二乘聖道必由戒剋人天兩報生天作輪王戒見二取穢汙諂詐若執戒為真道是為戒取唯戒極高復是見取為樂持戒翻成穢染持奉多途此約機緣也若了斯意則教門同異無不會通戒興存道本非為福但聞教之機時含利鈍鈍者引以世報利者以慧資成應知今序且被鈍根下流通中利鈍雙被故云戒淨有智慧便得第一道也戒足靈峯云喻戒以足無遠弗屆若欲超登上品蓮臺若欲承事十方諸佛若欲嚴淨無邊佛土若欲普入法界玄門莫不以此為初方便如御入險道失轄折軸縱放身口隨境不禁名為失轄戒善便喪故如軸折執御之人喻能持心險道喻五欲賊劫掠之處法合兩轄喻身口二業即是隨行橫軸喻本受戒體轄是括輪之物在軸兩頭二衆法照鏡法合集聽説戒有如照鏡鏡即教也説戒如合戰法合以説戒師提示過境同集聽衆隨事觀緣故如合戰四顯教功益中有二初喻辭王海月佛斯等四喻世所同高假以喻之縱有餘類竊比難矣以超羣獨勝無及於王深廣遍周豈過於海照迷濟世惟月難倫凡聖尊崇獨佛無等二法合衆律大律明緣起即二部戒中初明國土犯人起過白佛即緣起也辨相開遮即後之廣解法聚等文二部戒後有二十犍度等即法聚也俱調身口各有正儀應同名律戒經為上最唯有戒本親起行基言約義周攝僧斯要故云最也半月半月説依玄奘三藏所傳西方之制以黑前白後合為一月月虧至晦謂之黑月亦名黑分月盈至滿謂之白月亦名白分黑月或十四日或十五日月有大小故也如室羅筏拏即是五月之名從唐歷五月十六日至六月十五日較此土遲半月也近代習慣於初一十五日誦戒而初一日應提前一日乃合佛制也注中巳前偈文等結前生後意也持毀即前四喻廣序有三初中有二初能成之緣凡作法者必須緣具前事乃辦也今此緣成即文有七一和合將欲廣説事涉是非情容異見義須先和方應後集二集僧廣説和白非僧不行故須集也三道未具上既召集五衆同來既聽序偈四衆俱出文但明未具七緣亦應兼尼意令生尊重也分科四明説欲及清淨或有障緣故聽傳情應僧和義伽論云欲者所作事樂隨喜共同如法僧事業疏云欲者表心無二清淨表行無玷五尼請法六問事宗七答成法羯磨或翻作法辦事今翻為業業以造作成事為義即是授戒懺悔説戒等宣告文也四分中僧法羯磨有一百三十四尼同僧法本可聞戒惟在半月説戒作法之時不應與僧同座顯位有階差耳下三衆及白衣於半月説戒作法等時決不許聞若於常時可聞大僧律否相傳有二説一亦所不許近代弘律者多依此説二未妨靈芝資持記云問私習秉唱未具忽聞及未受前曾披經律因讀羯磨了知言義成障戒否答準諸律文並論僧中正作詐竊成障安有讀文而成障戒古來高僧多有在俗先披大藏今時信士多亦如之若皆障戒無乃太急學者詳之二所成之業業即羯磨望上能成之緣故曰所成也聽僧聽之聽去聲耳識所得也忍聽之聽平聲勸聽可也今音去平互通此約古音耳布薩説戒華梵雙標僧時到到即至也一者人到清淨大沙門入也二者時到法事契會也合宜之時若約説戒即是十五日布薩時至也忍聽勸令情和聽可勿事乖違也廣序第二誡敕時衆文有八段諸大德等舉宗告衆也波羅提木叉木叉果德之名戒定在因今言果者因中説也諸比丘等顯形心無異也汝等諦聽等誡妄緣也諦審也若有他問等舉罪比丘如法徵責有犯露答無犯默答也是事如是持事即戒相如是二字指法之詞即指後文也將釋廣教正宗先以義通略明二章一明篇聚名義篇是章品之名聚是攢集之號名殊義一一波羅夷此無可翻義當極惡即四棄也譬如斷人頭不可復起若犯此法不復成比丘故二僧伽婆尸沙婆尸沙者是殘僧殘者如人為他所斫五篇殘有咽喉故名為殘理須早救三波逸提義翻為墮四波羅提提舍尼義翻向彼悔向彼者即對首人五突吉羅翻為惡作惡説分身口二業也又翻云惡作通收身口也略名攝戒夷棄一波羅夷殘二僧殘蘭三偷蘭遮翻為大障善道罪通正從初二篇之因罪七聚及五篇不攝之諸果罪體兼輕重也分上中下三品捨墮四波逸提墮提單提五波羅提提舍尼提舍尼提舍六突吉羅或云惡作惡作惡説別分以標故為七聚也吉越七惡説二解方便罪相方便罪即是因罪初之二篇立三方便下諸篇聚立二方便今舉初二篇方便如下近方便次方便遠方便初篇上品蘭中品蘭突吉羅一切僧中悔二篇中品蘭下品蘭突吉羅界外四比丘悔一比丘悔同提未遂罪四分教人從生方便因罪因殺人未死初篇歸上品蘭次篇歸中品偷蘭已遂罪自性獨頭正罪果罪果殺非人究竟果頭蘭不從他生曰自性當體是果曰獨頭十方常住物四錢二逆殺非人上品十方現前物非人重物淫非道破羯磨僧三錢已下觸二形黃門髮爪相觸偷蘭正罪中品一有衣一無衣相觸為他出不淨畜用人髮剃三處毛以酥油灌下部露身行下品畜木石鉢食生肉血著外道衣等波羅夷戒經中來來謂從彼所出顯所據也淫戒先列有二義一此依犯緣先後而説佛成道後五年始犯淫戒故居先六年乃犯後三戒也二據障道重輕而言出家之人要斷煩惱煩惱最強盛者勿過於欲也大淫如第二篇初四戒同成淫行今異於彼故標戒名曰大淫也若比丘總舉受隨也共比丘別明受也受戒法儀共餘比丘則無別也同戒別明隨也共餘比丘同持此戒也此五句義該八篇若不還戒體淨不捨也諸篇不明者略也還者捨也文分九句戒羸不自悔體微生厭也持戒力弱曰羸不自悔即不捨也犯不淨行明業過也乃至共畜生列犯境也偏舉下類以況上故云乃至也是比丘波羅夷結罪名也不共住治罰法也滅擯永棄故不共住此戒緣起有三初須提那子家富出家後值荒年乞食難得乃往己村乞食母聞子歸迫令捨道還家子再三不允乃令與婦安子遂行不淨行後乃愁憂白佛佛制戒曰若比丘犯不淨行行淫欲法是比丘波羅夷不共住次有跋闍子比丘愁憂不樂淨行又有一乞食比丘與獼猴行不淨行大盜對不滿五錢而言也薩婆多論云有三解一準彼時所用之錢古大錢一當十六五錢則成八十也二隨所盜處所用五錢入重三依國制斷盜幾物應死即以為限南山取第二解也新譯五錢為五磨灑一磨灑可直此方銅錢八十其五磨灑計當四百若比丘能犯人也在村等盜物處也文分六句不與等明其心業也若為王等為俗法訶也是比丘波羅夷餘二同前戒不共住村落落者人所聚居之處間靜處村外靜地也恐疑靜處非盜故列空有二處凡有主者皆入罪科國法隨不與取法不與取者犯名也法者盜刑也即是國家滿五入死之法隨者謂比丘行盜準國法以判也捉殺四相治罰賊法而輕重文亂應言捉縛驅殺也捉瓶沙王遠祖治賊但令旃陀羅此翻殺者拍頭捉手便自愧恥永不行盜瓶沙王摩竭陀國王頻婆娑羅也縳其後世濁情澆雖捉猶作乃於多人之處祖王使人以灰圍之灰圍即同縛也驅至瓶沙王父時乃止灰圍行驅出法驅出似今之配流殺至瓶沙王登位七反驅出還入為盜王令將截去小指至阿闍世乃行殺戮也準有五法今以截指與殺合之汝是賊等三句訶罵賊辭有主物者大分三位初三寶物二別人物三非畜物今依鈔疏略録盜三寶物一章言未詳盡唯可知其概要耳一佛受用物如堂宇衣服及以金石泥土等曾為佛像所受用者不得互易常擬供養生世大福五百問事云不得賣佛身上繒與佛作衣律云若是佛園坐具等者一切天人供養同塔事故所以然者法身無相隨物以彰故此諸物即法身體二屬佛物即錢寶田園人畜等物不堪受用者俱係屬耳佛物此可互易五百問事云佛物得買供養具供佛所以得轉者由本施主通擬佛用故得貸易不同前者曾為勝相故唯一定也三供養物即香燈華幡供具之物律云供佛華多聽轉賣買香燈五百問事云佛幡多欲作餘佛事者得謂改作繒蓋幢幔等物未可轉賣作別用耳四獻佛物即飲食果實等侍佛之道俗人等皆得食之若用常住僧食供佛供後還入常住一法受用物紙素竹木上書經文或箱函曾經盛貯經典不許改轉此則一定敬同聖教所以然者紙素函器止是世物但望所詮至真無價故五百問事云燒故經者得罪非輕法物必有損像蠹經淨處藏之可矣二屬法物餘三同前前二可以轉易後與侍奉之人三供養物四獻法物一常住常住物四方常住如堂宇田園人畜米麵菜饌寺舍衆具等屬處已定不可分割取者結重必欲惠給餘寺羯磨和與若直送者是名盜損二十方常住物僧物如飯餅諸食物入當日供僧限者是也若未入當日供僧限者屬前常住常住物體通十方唯局本處若有護主他人盜者望護主結重或主自盜或主客同盜者望十方僧結偷蘭罪以不滿五錢故也三現前現前物如今諸俗以供養當處僧衆衣藥房具等取者結重四十方現前物如僧得施及亡五衆物以此物施通擬十方有僧皆得故此福分廣大無邊及論立法不可盡集制作羯磨用約十方隨現集者皆有其分故曰十方現前也若未羯磨盜者偷蘭以望十方僧不滿五錢由未作法人無限數也若羯磨已而行盜者人有限數故隨所盜輕重兩結就僧物中前二屬處永定通名常住但前無分義後是可分故加常住十方以簡之後二俱是即施通名現前但前局當處後通內外故加現前十方以別之戒相表記雖僅講數戒其難處應舉例詳釋養成自習之能力一有主物若無主物雖作有主物想盜之不犯重二有主物想若有主物作無主想無三有盜心取之無犯三有盜心若無盜心無犯四重物若五錢若直五錢若不滿五錢不犯重五興方便六舉離本處犯方便而不成不犯重舉離本處乃犯此約大分而言或立契約而盜物畫押時即結犯或以言辭誑惑而取口斷即結犯田宅等物永不可離或移標或燒毀等即結犯也大殺若比丘能犯人也故自手斷明是自業也人命所殺境界也破句文分六句持刀等明教他業也是比丘波羅夷不共住故除誤者無犯也先持刀與次乃口勸快稱心也咄下出其勸詞咄欲警令悟故先咄之惡活或現不淨或能造惡也作如是指上歎相也種種方便總收餘歎也大妄語若比丘能犯人也實無所知是妄語境也自稱言等正是犯過戒本也文分七句彼於異時等制疑網也文明兩種自言恐疑自首不結正犯故曰制疑網也除增上慢開心實也是比丘波羅夷不共住我得上人法是總舉也唯聖所感在凡人上故曰上人法也我已入聖等別示相也增上慢增上即指聖道於增上之法未得謂得實謂如是非故妄語名之為慢結前文諸大德等告衆情也初篇結章門中有三若比丘犯等除疑執也今問等欲説後篇前更簡衆也若比丘犯乃至如前釋同住疑也今解云未犯已前以人淨故得於二種法中同住今既一犯不得如昔同法共住故云不得共住如前也後亦如是乃至不應共住釋重犯疑也時人意謂初犯有戒可破後犯無罪今釋後犯亦爾故律云隨犯多少一一波羅夷也重犯同名前淫後殺不重犯同種前盜後復盜一滅擯法犯重無慚不肯發露學悔妄入清衆冒受利養其罪極大由清淨比丘舉罪令彼自承即僧中作滅擯羯磨説戒羯磨二種不攝利養亦絶分二懺波羅夷法先對僧陳乞無覆藏從僧乞戒僧作羯磨與戒名曰學悔終身列於比丘之末奪三十五事奪眷屬不與人授戒不受人依止不畜沙彌不應受善比丘禮拜等不應舉他罪在大比丘下座不得衆中誦律無能者聽不得作羯磨無能者聽作布薩自恣二羯磨情過深厚不任僧用不得足數僧説戒羯磨時來否隨意障不入地獄仍同財法附講篇聚攝一切戒之義表與戒目對之僧殘一前總説六羣起過之義又説前五戒不須細研惟觸媒二戒罪相復雜略閲之先説損害若比丘能犯人也故弄等明其過業也文分四句除夢中開緣也説小注五分散亂心眠吉憶行淫事吉涅槃若夢行淫寤應生悔僧伽婆尸沙結罪名也二若比丘能犯人也淫欲意染心也文分五句與女人犯境也身相觸等明過業也觸髮亦犯由染汙心若觸等結罪也尼夷三文分五句同上戒也四若比丘能犯人也淫欲意染心也文分六句於女人前犯境也自歎身正明犯法也言大妹等是其所稱也可持等結罪也五若比丘能犯人也往來等是業本也文分四句持男等釋前成相也若為成等結罪也六講題之前先説大略此戒與他戒有二不同一二殘合為一戒二文分兩大段戒本分二各有十句初立法十句二犯本十句初立法中文分十句明造房之緣務也若比丘謂造房者非犯人也自求無有自物處處乞求也作屋顯所為也無主對後有主也自為己除為他作也當應量等明分齊也內長兩丈四尺廣一丈四尺佛一磔手二尺為定也八尺之人可張一尺佛倍之則二尺此約周尺也當將等明乞法也彼比丘等正明與法相也無難處無命難梵行難也無妨處注中止存一緣如諸部論中廣引也二犯本中文分十句若比丘能犯人也有難處妨處自求作屋無主自為己不將等不乞處分也二罪若過等過量也僧殘結罪也七立法犯本各有八句前除自求及量限後除自求及過量也一殘為一戒文分兩大段初立法中文分八句若比丘欲作大房有主為己作當將等彼比丘等無難處無妨處二犯本中文分八句若比丘有難處有妨處作大房有主為己作不將等僧殘八若比丘能犯人也瞋恚等內有瞋心也非波等出謗境也文分七句以無根明無根也波羅等正重加謗也若於等自言虛相也問是佛問不問是自首也知此事無根説者正是首詞若比丘等結罪也九文有七句同上戒第三謗境即異分等也異分並非實犯假餘相謗故曰異分善見云以羊當人是名餘分事相似故片人畜乃殊欲義非異故以彼相用同此犯片無有乖故曰取片十就戒本中七句三雙一隻也一切諫戒例皆準此以下四戒彼是二字能所通濫由翻律人簡語不淨也若比丘所諫人也即此戒犯人也欲壞等所諫事也此句分三欲壞和合僧者明始心也方便受壞下立邪三寶也堅持不捨者行化於時也彼比丘應諫等屏諫也此句分二從初至堅持不捨一往牒過示知非法莫壞莫受也文有七句大德應與僧和合下勸同和相也乳水體別須二物各自論合如乳合乳如水合水增益安樂者除生死苦得涅槃樂也是比丘如是等拒屏諫也彼比丘等僧諫也羯磨義以白四羯磨止是告僧故須隨法加勸方名諫法不捨者拒僧諫也僧殘結罪也初有一雙所諫人所諫事也第二雙屏諫拒屏諫也第三雙僧諫拒僧諫也末有一隻即犯科也初是所諫餘二並能諫屏諫旁引僧諫正被十一若比丘等總明正助破僧人也若比丘者乃謂調達非正諫人有餘伴黨者正是所諫人也彼比丘語等明助伴破相正是諫家所為事也此句分二從初至莫諫此比丘一往遮僧不聽諫詞此比丘下出不聽之道理文有七句彼比丘言等明屏諫也是比丘如是等拒屏諫也以下同前戒十二若比丘所諫人也依聚落等所諫事也此句分三初明依聚落造過諸比丘當語下至不須住此正明牒過治擯是比丘下至不驅者明非理謗僧文有七句此正所為事也諸比丘諫等屏諫也是比丘如是等拒屏諫也以下同前戒十三若比丘所諫人也惡性等所諫事也此句分六初明惡性二明彼犯三諸比丘下如法諫諭四自身不受下正是拒諫五言諸下出拒勸之相六諸大德且止下文有七句明不受道理彼比丘諫等屏諫也是比丘如是等拒屏諫也以下同前戒諸大德等結前文也二篇結章門中有三九戒等除疑執也如疏廣明今不引也今問等欲説後篇前更簡衆也一治覆藏情過謂波利婆沙此方義翻或云覆藏或云別住別在一房不得與僧同處雖入僧中不得談論亦不得答也一日數隨覆藏之日多少行別住法不憶日月數者應從受大戒已來治二治罰先自求治次僧與法略舉一奪三十五事二執衆勞苦奉淨比丘如和尚法三白客比丘四出界見比丘即白行時再犯者還依本日治之懺僧殘法有四二治覆藏罪即突吉羅也戒本文中無此第二鈔同古判先懺疏云後懺三治僧殘情過謂摩那埵自喜行覆日滿僅餘六夜此云意喜僧喜此人能改悔成清淨人先乞法後與法治罰同上本日治如上四治僧殘罪即如戒本與出罪是也若不覆藏者僅有三四無一二也初篇雖重縱懺無用下篇皆輕直懺本罪惟僧殘二罪須先治情過獨異餘篇情即是心也此是時結成應法也二不定法二不定法者屏露不同為二不審實犯為不定二不定法所以置二篇下三篇上者上收淫觸語歎義勢是便下攝屏露同坐文復相順也第三人必約有智男子若盲聾小兒女人皆不名為證也所趣向處者謂向彼女家道行也所到處者至女家也若坐若臥犯殘提也若作者犯夷罪也此二戒若論所犯各自如篇此中但制令俗生疑正篇犯吉舉罪通於七衆本緣在女不因餘衆故所不列也尼戒本無二不定法三十捨墮法別初二篇戒判三篇以下威儀佛涅槃時云捨微細戒者或即指此而言也若就通論五篇治行有防非義悉名為戒各有法式悉名為威儀也威儀中如性罪殺畜命妄語戒等及此土譏嫌最甚者飲酒非時食及關係尼女諸戒等皆應持之其餘隨力可耳即力未能持者亦應學習可知佛世芳規五分律云佛言雖是我所制餘方不以為清淨者皆不應用雖非我所制餘方必應行者皆不得不行比丘諸戒皆屬菩薩戒中攝律儀戒之一部分故菩薩亦應兼學比丘律但三十捨墮中有十一戒不共學因菩薩應積財物廣攝衆生故開此十一戒耳第六七十十二十三十四十五十八二十二二十三二十七古解如此但亦未可定判瑜伽菩薩戒本中有開性罪七條據攝大乘論云此唯地上菩薩乃開又淫戒雖地上出家菩薩亦不開也初畜長衣過限戒長衣若但三衣者三衣之外為長若受百一物者百一外為長應量長如來八指廣四指已下但結吉羅迦提一月五月本言迦絺那略云迦提此翻為功德以前安居人坐夏有功五利賞德應於前安居竟僧衆共受迦絺那衣至十二月十五日捨於此五月之內皆獲五利五利者畜長財離衣宿背請別衆食食前後至他家依此五利總開八罪列表如下捨墮一長衣戒捨墮二離衣戒畜長財捨墮三月望衣戒離衣宿捨墮二十八急施衣戒捨墮二十九蘭若離衣戒背請單提三十二別衆食單提三十三食前後至他家單提四十一以上且據受迦絺那衣者於五月之內得此五利而免八罪若無迦絺那衣者僅於七月十六日始至八月十五日一月之內得此五利耳失衣奪失也故壞燒漂也非衣轉作帽襪親厚意取作與彼想謂非己得忘去以心迷故或忘財體或忘加法一捨墮一突吉羅上謂前衣墮罪下是不懺輒貿違教結吉前約虛想此約實失奪衣失衣燒衣漂衣謂衣財實失後還得者更得南山鈔十日説淨更受持之取著謂有犯捨三衣由失正衣即無長過可取著用故列不犯但仍須懺先罪也但本律或取著下又有或他與著四字故今未能依鈔意釋也受寄衣等並人衣隔絶不及故開受寄衣比丘即所囑藏舉人也問次第三戒俱明衣竟如何以分答如下表列初戒三衣體足竟也二戒三衣加持竟方有離過也三戒三衣同體足竟也二離三衣宿戒衣人異礙礙有四初染礙村有女人比丘與處動即相染譏過隨生若衣在此往會是難律中所謂梵行難也二隔礙律中水道斷路險難等三情礙律中奪想等及賊獸等多論王來作幻作樂人等來入界皆可畏避故亦成礙以上三礙在開緣中雖無離罪若不知望斷不妨失受故得成礙四界礙如戒本注中廣明今列表如下自然衣界十五種記號者與自然僧界名同四分有十一種他部四種一僧伽藍界二村界聚落七舍界十二道行界三樹界八堂界十三洲界四場界九庫界十四水界五車界十倉界十五井界六船界十一阿蘭若界自然攝僧界作法自然今講已前所講界有三種攝衣界作法自然處分不周檀越攝食界作法白二淨其中自然僧界與自然衣界各不同自然僧界有四種自然衣界有十五種其中聚落蘭若道行水界雖與自然僧界同名而其相皆異故了識師曾屬列表對照俾易明了今念其遺言列表如下自然僧界自然衣界聚落可分別者盡聚落但限一家及加勢分不可分別者六十三步若有三礙者衣須隨身蘭若無難者五里兼其勢分七十一步四尺八寸有難者五十八步四尺八寸道行前後各四十九尋一尋八尺縱廣六百步計三十九丈二尺計六十五步二尺水界船上有力人以水若砂由船入水四面擲所及處準有十三步即失由岸入池若涉水中者二十五肘計七步三尺南山疏中尚有相對作句分別及問答示義今略引之自然攝僧與自然攝衣寬狹一多各為四句初攝僧寬攝衣狹攝僧蘭若無難五里衣僅七十步餘二攝僧狹攝衣寬寬狹四句如不可分別聚落中有一家方二百步內通攝衣外兼勢分若攝僧僅六十三步三僧衣俱寬如可分別聚落中唯有一家也如可分別聚落中唯有一家也四僧衣俱狹如蘭若有難與衣界大致相同也初攝僧一攝衣多如可分別聚落有衆多家住盡聚落集僧攝衣則家家別也二攝僧多攝衣一一多四句如不可分別聚落中方二百步為一家衣可通攝僧則各據六十三步而有限制也三僧衣俱多如前一家中更加三礙來往不通彼此各攝則衣界亦多也四僧衣俱一如於不可分別聚落中有一家方五十步再加勢分共六十三步故僧衣俱一也問自然攝衣與自然攝僧何以不相等耶答有四義一攝衣以寬為緩以狹為急攝僧以近為緩以遠為急二攝衣當體隨相不假僧界而有三攝衣隨界而作大小不定僧界則四處六相各有限量隨處一定四衣有勢分僧無勢分捨衣謂界內或界外有隔礙手捉衣謂界內有染情礙至擲石所及處謂界內無三礙本宗雖開勢分必約無礙有則同他部不開也上明三事緩急前二顯有礙無勢分後明無礙有勢分餘衣謂百一供身服者若長衣淨施有別人可依故無有過也僧伽藍裏有一界有若干界若干界者為染隔情三障礙不會或有失衣故曰若干上云一界者謂無三礙也樹林多至二里四種如前大盜戒村落相阿蘭若七弓此依四分律四肘為一弓羯磨中自然僧界不可分別聚落依僧祇律五肘為一弓與今不同也初十界名二十界體別注分為五三諸界體別不相攝相四十界勢分義五人衣兩離結罪相也三月望衣過限戒故壞三衣此戒本由衣壞替換故開一月衣若新好則非所開又三衣中隨有一壞則開不必俱壞此戒分三位如戒相表記所列初位同長衣常開也第二位總十九日第三位唯開一日得則加持不得則説淨四取非親尼衣戒虛心謂專勤一意無他想故若乞得則非犯也五使非親尼浣故衣戒自使使人與亦爾十一綿作臥具戒野蠶尚犯何況家蠶雜忽蠶口初出名為忽十忽名為絲尚犯何況純作今以紅綢製為祖衣色質俱非大違佛制又出家人有以綢物製海青衫褲者既違佛制并受居士之譏嫌近來居士皆知戒殺不著綢物故見有出家人著者即生輕慢心而譏嫌也戒之戒之十三白毛臥具戒尨即是粗毛蒼黃色者鉢羅此云四兩上下諸戒屢云羊毛等今出家人若著羊皮衣亦受大譏嫌冬季畏寒可以駝絨代綿絮用之鋪於衣中足以禦寒因剪駝駥時決不礙其生命也十六持羊毛過限戒三由旬由旬大小不等今約計百里耳毳裝舊云裝音壯即細羊毛裘雨中披行者十八畜錢寶戒前謂不達淨意還中二意後約解意十九貿錢寶戒是錢寶局所貿也能貿則通衣寶餘物小注金鋌鋋治資持記皆作鋋行宗記皆作鋌又治作冶今略為審核鋌字較善治字似勝於冶也金鋌俗稱金錠元以前作鋌鋌治者行宗記謂捶打及揩摩也胡膠即此方蠟類二十販賣戒販為利故收為利故出諍價而高為販也販賣並是出物此戒應分三位賣為利故出強增價而高但約先收不收曰賣也以分兩異買為利而取故減前價名買也律文所列但以衣食互易此指緣起説此戒正是貿衣戒也依靈芝記對前戒作四句料揀一以衣易寶二以寶易衣三以寶易寶四以衣易衣一三犯前戒二四犯此戒準此但約所貿以分兩戒不論能貿也又南山亦謂此貿衣戒對前貿寶戒有五種不同初對人不同貿寶對七衆俱犯貿衣唯對在家二衆犯二貿寶自作教他為己同犯除為三寶貿衣使人不犯三貿寶一制不開自為貿衣則開酥油相易四寶對俗捨衣對道捨五寶捨易淨物衣捨還元物律據有人可貿理必不得自為若無人者如本律衣犍度及他律並聽比丘身自交貿但不增減五分律云使淨人易時應心念寧使彼得我利我不得彼利準知自貿亦爾二十二非分乞鉢戒五綴律云相去兩指間一綴若約中人一指面一寸即取痕脈長二寸許即為一綴五綴共一尺也綴者即以鉛錫等補二十三乞縷使非親織師戒繀蘇內切謂著絲於車也二十六畜七日藥過限戒手受以手法過中即失非延久故二受由先手受口法方成故兼二受無緣不遺與人乃至不忘去二十七過前求雨衣過前用戒此戒及下戒皆兩戒共制也雨衣四月一日用八月十五日當捨捨作餘衣或受持或淨施此衣不得作三衣不得著入河池中浴不得裸身著時中得準此若犯過前求則不犯過前用二十八過前受急施衣過後畜戒施主本為安居故施忽有急緣不及夏竟七月十六日預先持施佛開安居未竟十日七月六日至十五日內受因生二過一者過前犯由受施二者過後罪據畜長也過前七月六日前是十日內七月六日後之十日內準知此戒亦前後不重犯也二十九蘭若有疑離衣過限戒一聚蘭二處二有疑無疑此戒與第二戒有六別三一宿六夜四前因病緣此唯賊難五前通三時此局冬分六前開羯磨此但直離九十單提法初故妄語戒定行心中定謂禪定行即事亂所忍異初約三受釋文明二受義兼捨受四共女人宿戒若亞斜倚也六共未受具同誦戒阿等律舉阿羅波遮那為例今時所誦密咒之類一説二説三説謂初後次第非説之遍數七説粗罪戒無僧法開律因舍利弗為衆所差於俗衆中説調達過舍利弗畏慎佛言衆僧差無犯若粗惡非粗惡想謂迷心也迷重為輕説亦犯吉十掘地戒多論謂十掘地戒及十一壞生種戒制意有三一不惱害衆生故二止誹謗故彼計生地生草皆有生命三為大護佛法故王臣息心不復役使十一壞生種戒壞音怪損毀也鬼神村所以名草木等以為村者十誦云蚊蟻諸蟲以之為舍四分云神所依止如在聚落故云村也十二餘語惱觸戒又名身口綺戒餘語即口惱觸即身若一坐食若不作餘食法食此二種頭陀相也以前境既足起壞威儀已食一口未能輒也相似身綺故須顯示此二種法所以別者不作餘法猶噉小食一坐食者絶無餘噉十八坐脫腳牀戒重屋樓屋覆板薄而不固脫腳牀即腳搖動不久將脫故律注云腳入梐也入梐即入孔栒頭也十九用蟲水戒用水澆物以物擲水並計蟲魚多少而犯一一墮也問此戒為約用水為約蟲死答此戒不就損命中制是深防制若彼命斷自依殺畜生戒結罪今蟲尚未死亦計數成犯也二十一輒教授尼戒日如白半月初四至十三黑半月十九至二十八此據僧祇律三十八食殘宿食戒是殘宿中前手受四藥不加口法過中別指三藥曰殘若復經夜曰宿此殘宿之宿與內宿不同殘宿之宿已手受者經夜內宿未手受者共宿四十二食前後至他家戒同利即同受請者食前後食時之前後相傳以辰時為食時明相出至食時食前食時至日中食後四十七過限藥請戒請有四種等前二過限犯提第三句過案犯吉第四無犯夏四月文列夏中僧祇隨三時中或一月半月有過皆犯五十五怖比丘戒袈裟味六味之雜味也五十七露地然火戒芻摩是梵語草名也音弋麥皮六十著新衣戒無緣善見律若遭賊緣等得權著五大色衣五大色有五正色五間色二種五正者青藍之淺者黃赤朱也白黑五間色者緋大赤紅赤白色紫青赤色緑硫黃青黑木蘭青者銅青即古銅色也黑者雜泥等染之非純黑也木蘭四川有此樹皮赤黑色可以染衣也點著極小如豌豆不得並作或一三五七九不得如華形作先已作淨後洗脫不須更淨所以淨者異外道故令與俗別又失則易覓也六十二飲蟲水戒此是深防中制為養物命但知有蟲飲用結罪不待命斷斷則屬前殺戒六十六發四諍戒四諍言諍因評法相如律諍十八事覓諍因他舉罪諍其成否犯諍因有懺罪諍其重輕事諍唯據羯磨僧事若非羯磨並歸上三此段録行宗記文自發起已鬬諍事因諍助發也八十四過量牀戒除入梐孔上謂入孔栒頭不在數也八十五兜羅貯褥戒兜羅多論云草木華綿之總稱所以制者以是貴人所畜故人所嫌故喜生蟲故又若臥軟暖後得粗硬不堪忍故四提舍尼法昔云向彼悔今譯云可訶法也一村中取非親尼食戒敬相無絶由尼知比丘不得自受方便施與故云也二食尼指授食戒開緣中第二反初緣也第三反第二緣也三受學家食戒學家即證初果者此局聖境末世全無但可知教必無有犯衆式叉迦羅尼法式叉是學迦羅尼者云應當作語倒故言應學也威儀微細量等塵沙且約人之喜犯舉百列之若從境明數略説或四萬二千或八萬四千廣説則無量無邊周遍法界也涅槃僧此云內衣即是裙也富羅短靿靴也佛塔殿堂等亦爾七滅諍法四諍即病起之源七藥為除滅之法四諍中言覓犯諍各分上中下三品共為九品事諍者非是別有即上三諍涉及羯磨皆歸事攝故事諍亦有九品也行宗記有圖刊本訛誤今訂正如下下品三現前滅言諍中品五現前滅上品五現前多人語滅下品五現前憶念滅覓諍中品五現前不癡滅共有九品上品五現前罪處所滅下品三現前自言治滅犯諍中品五現前自言治滅上品五現前草覆地滅事諍亦有九品者隨言覓犯諍如上分之現前一種通三諍該九品除下品言諍犯諍不秉羯磨者但有三法餘七並加羯磨皆具五法自言一種局後犯諍通治下中二品自餘五種單對一品古來相傳滅諍法難解依上列圖表觀之皎如指掌矣一人現前兩家同聚各説教理也三法現前二法現前以三藏教判也三毗尼現前教旨明白疑開自遣也一人現前須各陳諍意也二法現前須僧作法詳評也五法現前三毗尼現前須作單白羯磨有德同評無德者遣出也四僧現前須四人已上戒見利及三業無乖同聚也五界現前局據作法分齊隨約限內有僧皆集無得隱也三法現前與後五法中前三相濫今揀別之三中能所合論俱別人故人五中但收所諍能斷屬後僧中三中是教文法五中是羯磨三中約開迷殄息毗尼五中據選德同評憶念毗尼無著羅漢方行此法下凡不合行也憶念緣起即僧殘中二謗戒緣前云慈地比丘瞋謗即六羣之一也三種狂癡初是下品二即上品此二不與法三即中品故須與法也十八事諍法非法乃至説不説除遮不至白衣家由對俗犯須往白衣處謝罪所以除之附録衣有十種多是印度之衣體此無所顯故前不列之今附録於此以備參考焉憍賒耶野蠶衣劫貝木綿衣欽婆羅細毛衣芻摩麻衣讖摩粗布衣扇那樹名皮可織衣麻印度有多種青黃赤色讖夷羅鳩夷羅讖羅半尼此三無翻七佛略教無為最忍力最大不為緣動名曰無為諸行中勝故曰最也譬如蜂採花行者待食資身如蜂在聚乞食如採不壞色與香終不多求壞俗之信但取其味去趣乞少許資身長道不違戾衆行不乖也大仙人佛於世俗中是尊勝故又於聲聞獨覺之仙是殊勝故號大仙也無事僧五年制廣教便有犯人但最初不犯即名無事也至十二年方有重犯以下五言偈為總流通歲次癸酉八月二十四日始講至十月三日為南山律祖涅槃日講解都訖時居溫陵尊勝院
